; Add/merge these into NarutoStorm4Revived\steam_config.ini

; normal = clean launch/runtime/crash logs only
; debug = verbose hook/research logs
log_level=normal
log_steam_calls=0
log_steam_interfaces=0
log_hook_plan=0
log_online_menu_research=0
log_repeated_messages=0

; Base EXE/unknown CRC safety
safe_mode_unknown_exe=1
allow_fixed_addresses_unknown_exe=0
online_menu_allow_fixed_addresses=0

; Disable unsafe runtime memory patchers unless EXE profile is verified
slot_expansion_auto_apply=0
character_roster_runtime_patch=0
stage_scene_expansion_patch=0
